<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Trade Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 2.5rem; background: linear-gradient(90deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; }
        .metric-value { font-size: 2rem; font-weight: bold; }
        .metric-label { color: #888; margin-top: 5px; }
        .profit { color: #00ff88; }
        .loss { color: #ff4757; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,212,255,0.2); }
        .buy { color: #00ff88; }
        .sell { color: #ff4757; }
        .loading { text-align: center; color: #888; padding: 30px; }
        .last-update { text-align: center; color: #666; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 MT5 Trade Dashboard</h1>
        
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-value" id="totalTrades">0</div>
                <div class="metric-label">Total Trades</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="totalProfit">฿0</div>
                <div class="metric-label">Total Profit</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="winRate">0%</div>
                <div class="metric-label">Win Rate</div>
            </div>
        </div>

        <h2>📊 Trade History</h2>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Volume</th>
                    <th>Price</th>
                    <th>Profit</th>
                </tr>
            </thead>
            <tbody id="tradeTable">
                <tr><td colspan="5" class="loading">Loading...</td></tr>
            </tbody>
        </table>
        <div class="last-update" id="lastUpdate"></div>
    </div>

    <script>
        const PROJECT_ID = "mt5-trading-a1e86";
        
        function formatTime(ts) {
            if (!ts || ts === '-') return '-';
            // Unix timestamp
            if (typeof ts === 'string' && /^\d+$/.test(ts)) {
                const date = new Date(parseInt(ts) * 1000);
                return date.toLocaleString('th-TH', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            }
            return ts;
        }
        
        // Use allorigins proxy
        async function fetchWithCORS(url) {
            try {
                const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const data = await response.json();
                return JSON.parse(data.contents);
            } catch(e) {
                console.error('Proxy error:', e);
                return null;
            }
        }
        
        async function loadData() {
            try {
                const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/trades`;
                const data = await fetchWithCORS(url);
                
                if (!data || !data.documents || data.documents.length === 0) {
                    document.getElementById('tradeTable').innerHTML = '<tr><td colspan="5">No data</td></tr>';
                    return;
                }
                
                // Process data
                const trades = data.documents.map(doc => {
                    const f = doc.fields || {};
                    return {
                        type: f.type?.stringValue || '-',
                        volume: f.volume?.doubleValue || 0,
                        price: f.close_price?.doubleValue || f.open_price?.integerValue || 0,
                        profit: f.profit?.doubleValue || 0,
                        time: f.close_time?.stringValue || f.open_time?.stringValue || '-'
                    };
                }).filter(t => t.time !== '-' && t.time); // Only closed trades
                
                // Sort by time (newest first)
                trades.sort((a, b) => parseInt(b.time) - parseInt(a.time));
                
                // Calculate stats
                const totalTrades = trades.length;
                const totalProfit = trades.reduce((sum, t) => sum + (t.profit || 0), 0);
                const wins = trades.filter(t => t.profit > 0).length;
                const winRate = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(1) : 0;
                
                // Update UI
                document.getElementById('totalTrades').textContent = totalTrades;
                const profitEl = document.getElementById('totalProfit');
                profitEl.textContent = '฿' + totalProfit.toFixed(2);
                profitEl.className = 'metric-value ' + (totalProfit >= 0 ? 'profit' : 'loss');
                document.getElementById('winRate').textContent = winRate + '%';
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
                
                // Render table
                document.getElementById('tradeTable').innerHTML = trades.map(t => `
                    <tr>
                        <td>${formatTime(t.time)}</td>
                        <td class="${t.type === 'BUY' ? 'buy' : 'sell'}">${t.type}</td>
                        <td>${t.volume.toFixed(2)}</td>
                        <td>${t.price.toFixed(2)}</td>
                        <td class="${t.profit >= 0 ? 'profit' : 'loss'}">฿${t.profit.toFixed(2)}</td>
                    </tr>
                `).join('');
                
            } catch(e) {
                console.error(e);
                document.getElementById('tradeTable').innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
            }
        }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
