<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Trade Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; background: linear-gradient(90deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .last-update { color: #888; font-size: 0.9rem; margin-top: 10px; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; }
        .metric-value { font-size: 2rem; font-weight: bold; }
        .metric-label { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .profit { color: #00ff88; }
        .loss { color: #ff4757; }
        .chart-section { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .chart-section h2 { font-size: 1.5rem; margin-bottom: 20px; color: #00d4ff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,212,255,0.2); color: #00d4ff; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .buy { color: #00ff88; font-weight: bold; }
        .sell { color: #ff4757; font-weight: bold; }
        .loading { text-align: center; color: #888; padding: 30px; }
        .empty { text-align: center; color: #666; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 MT5 Trade Dashboard</h1>
            <div class="last-update" id="lastUpdate">Last Update: --:--:--</div>
        </header>
        
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-value" id="totalTrades">0</div>
                <div class="metric-label">Total Trades</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="totalProfit">฿0</div>
                <div class="metric-label">Total Profit</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="winRate">0%</div>
                <div class="metric-label">Win Rate</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="avgProfit">฿0</div>
                <div class="metric-label">Avg Profit/Trade</div>
            </div>
        </div>

        <div class="chart-section">
            <h2>📈 Trade History</h2>
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>Action</th>
                        <th>Volume</th>
                        <th>Open Price</th>
                        <th>Close Price</th>
                        <th>Profit</th>
                        <th>Open Time</th>
                        <th>Close Time</th>
                    </tr>
                </thead>
                <tbody id="tradeTable">
                    <tr><td colspan="10" class="loading">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyD0D2sWf2Wf7U",
            authDomain: "mt5-trading-a1e86.firebaseapp.com",
            projectId: "mt5-trading-a1e86",
            storageBucket: "mt5-trading-a1e86.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:0000000000000000000000"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // รองรับทั้ง string และ number (Unix timestamp)
        function formatTime(ts) {
            if (!ts || ts === '-') return '-';
            // แปลงเป็น number ถ้าเป็น string
            const tsNum = typeof ts === 'string' ? parseInt(ts) : ts;
            if (!isNaN(tsNum)) {
                const date = new Date(tsNum * 1000);
                return date.toLocaleString('th-TH', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
            }
            return ts;
        }
        
        async function loadData() {
            try {
                // ดึงข้อมูลจาก Firestore โดยตรง
                const snapshot = await db.collection('trades').get();
                
                console.log('Data received:', snapshot.size, 'documents');
                
                if (snapshot.empty) {
                    document.getElementById('tradeTable').innerHTML = '<tr><td colspan="10" class="empty">ไม่มีข้อมูลการเทรด</td></tr>';
                    return;
                }
                
                // Process all trades (open + closed)
                const trades = [];
                let idx = 0;
                snapshot.forEach((doc) => {
                    const f = doc.data();
                    const tradeType = f.type || '-';
                    const profit = f.profit || 0;
                    const status = f.status || 'closed';
                    
                    // Calculate action
                    let action = tradeType;
                    if (tradeType === 'BUY' && profit < 0) action = 'SELL (Close)';
                    else if (tradeType === 'BUY' && profit > 0) action = 'BUY (Close)';
                    else if (tradeType === 'SELL' && profit < 0) action = 'BUY (Close)';
                    else if (tradeType === 'SELL' && profit > 0) action = 'SELL (Close)';
                    
                    trades.push({
                        orderNo: (idx + 1).toString().padStart(4, '0'),
                        symbol: f.symbol || '-',
                        type: tradeType,
                        action: action,
                        volume: f.volume || 0,
                        openPrice: Number(f.open_price) || 0,
                        closePrice: Number(f.close_price) || 0,
                        profit: Number(profit) || 0,
                        openTime: Number(f.open_time) || '-',
                        closeTime: Number(f.close_time) || '-',
                        status: status
                    });
                    idx++;
                });
                
                // sort โดยใช้ number แทน string
                trades.sort((a, b) => {
                    const timeA = parseInt(a.closeTime) || parseInt(a.openTime) || 0;
                    const timeB = parseInt(b.closeTime) || parseInt(b.openTime) || 0;
                    return timeA - timeB;
                });
                
                // Reassign order numbers after sort (0001, 0002, ...)
                trades.forEach((t, idx) => t.orderNo = (idx + 1).toString().padStart(4, '0'));
                
                // Calculate stats (only closed trades with profit != 0)
                const closedTrades = trades.filter(t => t.status === 'closed' && t.profit !== 0);
                const winning = closedTrades.filter(t => t.profit > 0);
                const totalTrades = closedTrades.length;
                const totalProfit = closedTrades.reduce((sum, t) => sum + t.profit, 0);
                const winRate = totalTrades > 0 ? (winning.length / totalTrades * 100).toFixed(1) : 0;
                const avgProfit = totalTrades > 0 ? totalProfit / totalTrades : 0;
                
                // Update stats
                document.getElementById('totalTrades').textContent = totalTrades;
                const profitEl = document.getElementById('totalProfit');
                profitEl.textContent = '฿' + totalProfit.toFixed(2);
                profitEl.className = 'metric-value ' + (totalProfit >= 0 ? 'profit' : 'loss');
                document.getElementById('winRate').textContent = winRate + '%';
                document.getElementById('avgProfit').textContent = '฿' + avgProfit.toFixed(2);
                document.getElementById('lastUpdate').textContent = 'Last Update: ' + new Date().toLocaleTimeString();
                
                // Render table
                document.getElementById('tradeTable').innerHTML = trades.map(t => `
                    <tr>
                        <td>${t.orderNo}</td>
                        <td>${t.symbol}</td>
                        <td class="${t.type === 'BUY' ? 'buy' : 'sell'}">${t.type}</td>
                        <td class="${t.action.includes('BUY') ? 'buy' : 'sell'}">${t.action}</td>
                        <td>${t.volume.toFixed(2)}</td>
                        <td>${t.openPrice ? t.openPrice.toFixed(5) : '-'}</td>
                        <td>${t.closePrice ? t.closePrice.toFixed(5) : '-'}</td>
                        <td class="${t.profit >= 0 ? 'profit' : 'loss'}">฿${t.profit.toFixed(2)}</td>
                        <td>${formatTime(t.openTime)}</td>
                        <td>${formatTime(t.closeTime)}</td>
                    </tr>
                `).join('');
                
            } catch(e) {
                console.error('Error loading data:', e);
                document.getElementById('tradeTable').innerHTML = '<tr><td colspan="10" class="empty">Error: ' + e.message + '</td></tr>';
            }
        }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
